<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prometeo — Consulta y Gestión de NID</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
      background: #e8eaed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-window {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      max-height: 820px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(60, 64, 67, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }

    .bot-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      color: #202124;
    }

    .header-info p {
      font-size: 12px;
      color: #5f6368;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message-row.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user .message-bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.bot .message-bubble {
      background: #fff;
      color: #202124;
      border: 1px solid #dadce0;
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      font-size: 11px;
      color: #80868b;
      margin-top: 4px;
      padding: 0 4px;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .action-buttons button {
      border: 1px solid #dadce0;
      background: #fff;
      color: #1a73e8;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .action-buttons button:hover:not(:disabled) {
      background: #e8f0fe;
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.15);
    }

    .action-buttons button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }

    .chat-input-bar input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 14px;
      outline: none;
      color: #202124;
    }

    .chat-input-bar input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }

    .chat-input-bar button {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .chat-input-bar button:hover {
      background: #1557b0;
    }

    .chat-input-bar button:disabled {
      background: #aecbfa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-window">
    <header class="chat-header">
      <div class="bot-avatar">IDM</div>
      <div class="header-info">
        <h1>Agente IDM · Prometeo</h1>
        <p>Consulta y Gestión de NID · Simulación Google Chat</p>
      </div>
    </header>

    <div class="chat-messages" id="messages"></div>

    <form class="chat-input-bar" id="chatForm">
      <input
        type="text"
        id="nidInput"
        placeholder="Escribe un NID (ej: NID-12345)..."
        autocomplete="off"
        required
      />
      <button type="submit" id="sendBtn" title="Enviar">➤</button>
    </form>
  </div>

  <script>
    /**
     * Flujo Lucidchart (lanes: Chatbot / Orquestador / Ticketing):
     * Start → Recibe NID → Revisar 9 procesos → COMPLETED | IN_PROGRESS | REJECTED
     * COMPLETED / IN_PROGRESS → presentar info → End
     * REJECTED → Ticket to area | Manual review (ambos habilitados)
     */
    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const nidInput = document.getElementById('nidInput');
    const sendBtn = document.getElementById('sendBtn');

    addBotMessage(
      'Hola. Soy tu agente de IDM.\n\nEscribe un NID para consultar su estado en el orquestador.'
    );

    chatForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      const nid = nidInput.value.trim();
      if (!nid) return;

      addUserMessage(nid);
      nidInput.value = '';
      await consultNid(nid);
    });

    function nowTime() {
      return new Date().toLocaleTimeString('es-MX', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(isLoading) {
      sendBtn.disabled = isLoading;
      nidInput.disabled = isLoading;
    }

    function addUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'message-row user';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      row.appendChild(bubble);

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = 'Tú · ' + nowTime();
      row.appendChild(meta);

      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function addBotMessage(text, actions) {
      const row = document.createElement('div');
      row.className = 'message-row bot';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      row.appendChild(bubble);

      if (actions && actions.length) {
        const actionsEl = document.createElement('div');
        actionsEl.className = 'action-buttons';

        actions.forEach(function (action) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = action.label;
          if (action.disabled) {
            btn.disabled = true;
            btn.title = action.disabledReason || '';
          }
          btn.addEventListener('click', function () {
            if (btn.disabled) return;
            actionsEl.querySelectorAll('button').forEach(function (b) {
              b.disabled = true;
            });
            action.onClick();
          });
          actionsEl.appendChild(btn);
        });

        row.appendChild(actionsEl);
      }

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = 'Agente IDM · ' + nowTime();
      row.appendChild(meta);

      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function formatBotResponse(payload) {
      const nid = payload.nid;
      const data = payload.data;

      if (payload.status === 'COMPLETED') {
        return (
          'Estado: COMPLETED\n' +
          'NID: ' + nid + '\n' +
          'Fecha de ejecución: ' + data.executionDate + '\n' +
          'Comentario de aprobación: ' + data.approvalComment
        );
      }

      if (payload.status === 'IN_PROGRESS') {
        var msg =
          'Estado: IN_PROGRESS\n' +
          'NID: ' + nid + '\n' +
          'Fecha/hora de inicio: ' + data.startDate;

        // Lucidchart: si es tarea de aprobación → mostrar orden/paso actual
        if (data.isApprovalTask && data.currentStep) {
          msg += '\nPaso actual: ' + data.currentStep;
        }
        return msg;
      }

      return (
        'Estado: REJECTED\n' +
        'NID: ' + nid + '\n' +
        'Política: ' + data.policy + '\n' +
        'Comentario: ' + data.rejectionComment
      );
    }

    /**
     * REJECTED: Ticket to area / Manual review (ambos habilitados).
     */
    function buildRejectedActions(payload) {
      const nid = payload.nid;
      const area = (payload.data && payload.data.area) || 'Área responsable';

      return [
        {
          label: 'Ticket to area',
          onClick: async function () {
            addUserMessage('Ticket to area');
            await createAndWatchTicket(nid, 'solution', area);
          }
        },
        {
          label: 'Manual review',
          onClick: async function () {
            addUserMessage('Manual review');
            await createAndWatchTicket(nid, 'manual', area);
          }
        }
      ];
    }

    async function createAndWatchTicket(nid, type, area) {
      try {
        const response = await fetch('/api/ticket', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nid: nid, type: type, area: area })
        });
        const ticket = await response.json();

        if (!response.ok) {
          addBotMessage('Error: ' + (ticket.error || 'No se pudo crear el ticket.'));
          return;
        }

        addBotMessage(ticket.message + '\nTicket: ' + ticket.ticketId);

        // Lucidchart: Mantener ticket actualizado hasta resolución → Notificar cierre → End
        await waitForTicketClose(ticket.ticketId);
      } catch (err) {
        addBotMessage('No se pudo conectar con Ticketing. ¿El servidor está activo?');
      }
    }

    async function waitForTicketClose(ticketId) {
      for (var i = 0; i < 20; i++) {
        await sleep(500);
        try {
          const response = await fetch('/api/ticket/' + ticketId);
          if (!response.ok) continue;
          const ticket = await response.json();
          if (ticket.status === 'CLOSED') {
            addBotMessage(
              'Ticket ' +
                ticketId +
                ' cerrado.\nÁrea: ' +
                ticket.area +
                '\nCierre: ' +
                ticket.closedAt +
                '\n\nFin del flujo.'
            );
            return;
          }
        } catch (err) {
          // reintentar polling
        }
      }
      addBotMessage('El ticket ' + ticketId + ' sigue en seguimiento. Te notificaremos al cierre.');
    }

    function sleep(ms) {
      return new Promise(function (resolve) {
        setTimeout(resolve, ms);
      });
    }

    async function consultNid(nid) {
      setLoading(true);

      try {
        const response = await fetch('/api/nid', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nid: nid })
        });
        const payload = await response.json();

        if (!response.ok) {
          addBotMessage('Error: ' + (payload.error || 'No se pudo consultar el NID.'));
          return;
        }

        const text = formatBotResponse(payload);

        if (payload.status === 'REJECTED') {
          addBotMessage(text, buildRejectedActions(payload));
        } else {
          // COMPLETED e IN_PROGRESS terminan en End (sin botones)
          addBotMessage(text);
        }
      } catch (err) {
        addBotMessage(
          'No pude conectar con el orquestador. Verifica el servidor en el puerto 3000.'
        );
      } finally {
        setLoading(false);
        nidInput.focus();
      }
    }
  </script>
</body>
</html>
