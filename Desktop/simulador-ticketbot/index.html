<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Agente de IDM — Simulación Google Chat</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Google Sans", "Segoe UI", Roboto, Arial, sans-serif;
      background: #e8eaed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-window {
      width: 100%;
      max-width: 720px;
      height: 90vh;
      max-height: 820px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(60, 64, 67, 0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }

    .bot-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      color: #202124;
    }

    .header-info p {
      font-size: 12px;
      color: #5f6368;
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background: #f8f9fa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .message-row.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-row.user .message-bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-row.bot .message-bubble {
      background: #fff;
      color: #202124;
      border: 1px solid #dadce0;
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      font-size: 11px;
      color: #80868b;
      margin-top: 4px;
      padding: 0 4px;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .action-buttons button {
      border: 1px solid #dadce0;
      background: #fff;
      color: #1a73e8;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .action-buttons button:hover {
      background: #e8f0fe;
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.15);
    }

    .action-buttons button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }

    .chat-input-bar input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 12px 18px;
      font-size: 14px;
      outline: none;
      color: #202124;
    }

    .chat-input-bar input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }

    .chat-input-bar button {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .chat-input-bar button:hover {
      background: #1557b0;
    }

    .chat-input-bar button:disabled {
      background: #aecbfa;
      cursor: not-allowed;
    }

    .status-completed { color: #137333; font-weight: 600; }
    .status-progress { color: #e37400; font-weight: 600; }
    .status-rejected { color: #c5221f; font-weight: 600; }
  </style>
</head>
<body>
  <div class="chat-window">
    <header class="chat-header">
      <div class="bot-avatar">TB</div>
      <div class="header-info">
        <h1>Ticketbot</h1>
        <p>Simulación · Consulta de NID · Google Chat</p>
      </div>
    </header>

    <div class="chat-messages" id="messages"></div>

    <form class="chat-input-bar" id="chatForm">
      <input
        type="text"
        id="nidInput"
        placeholder="Escribe un NID (ej: NID-12345)..."
        autocomplete="off"
        required
      />
      <button type="submit" id="sendBtn" title="Enviar">➤</button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const nidInput = document.getElementById('nidInput');
    const sendBtn = document.getElementById('sendBtn');

    // Mensaje de bienvenida al cargar
    addBotMessage(
      '¡Hola! Soy tu agente de IDM.\nEscribe un NID y consultaré el orquestador para decirte su estado.'
    );

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const nid = nidInput.value.trim();
      if (!nid) return;

      addUserMessage(nid);
      nidInput.value = '';
      await consultNid(nid);
    });

    function nowTime() {
      return new Date().toLocaleTimeString('es-MX', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function addUserMessage(text) {
      const row = document.createElement('div');
      row.className = 'message-row user';
      row.innerHTML =
        '<div class="message-bubble"></div>' +
        '<div class="message-meta"></div>';
      row.querySelector('.message-bubble').textContent = text;
      row.querySelector('.message-meta').textContent = 'Tú · ' + nowTime();
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    function addBotMessage(text, options) {
      const row = document.createElement('div');
      row.className = 'message-row bot';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      row.appendChild(bubble);

      if (options && options.actions) {
        const actions = document.createElement('div');
        actions.className = 'action-buttons';

        options.actions.forEach(function (action) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = action.label;
          btn.addEventListener('click', function () {
            // Deshabilitar botones tras el clic para evitar doble acción
            actions.querySelectorAll('button').forEach(function (b) {
              b.disabled = true;
            });
            action.onClick();
          });
          actions.appendChild(btn);
        });

        row.appendChild(actions);
      }

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = 'Ticketbot · ' + nowTime();
      row.appendChild(meta);

      messagesEl.appendChild(row);
      scrollToBottom();
      return row;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(isLoading) {
      sendBtn.disabled = isLoading;
      nidInput.disabled = isLoading;
    }

    function formatBotResponse(payload) {
      const nid = payload.nid;
      const status = payload.status;
      const data = payload.data;

      if (status === 'COMPLETED') {
        return (
          'Estado: COMPLETED\n' +
          'NID: ' + nid + '\n' +
          'Fecha de ejecución: ' + data.executionDate + '\n' +
          'Comentario de aprobación: ' + data.approvalComment
        );
      }

      if (status === 'IN_PROGRESS') {
        return (
          'Estado: IN_PROGRESS\n' +
          'NID: ' + nid + '\n' +
          'Fecha de inicio: ' + data.startDate + '\n' +
          'Paso actual: ' + data.currentStep
        );
      }

      // REJECTED
      return (
        'Estado: REJECTED\n' +
        'NID: ' + nid + '\n' +
        'Política: ' + data.policy + '\n' +
        'Comentario de rechazo: ' + data.rejectionComment
      );
    }

    async function consultNid(nid) {
      setLoading(true);

      try {
        const response = await fetch('/api/nid', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nid: nid })
        });

        const payload = await response.json();

        if (!response.ok) {
          addBotMessage('Error: ' + (payload.error || 'No se pudo consultar el NID.'));
          return;
        }

        const text = formatBotResponse(payload);

        if (payload.status === 'REJECTED') {
          addBotMessage(text, {
            actions: [
              {
                label: 'Reintento',
                onClick: function () {
                  addUserMessage('Reintento: ' + nid);
                  consultNid(nid);
                }
              },
              {
                label: 'Ticket to area',
                onClick: function () {
                  addUserMessage('Ticket to area');
                  addBotMessage(
                    'Ticket de solución creado en el sistema. Te notificaremos al cierre.'
                  );
                }
              },
              {
                label: 'Manual review',
                onClick: function () {
                  addUserMessage('Manual review');
                  addBotMessage(
                    'Ticket de validación manual creado. Te notificaremos al cierre.'
                  );
                }
              }
            ]
          });
        } else {
          addBotMessage(text);
        }
      } catch (err) {
        addBotMessage(
          'No pude conectar con el servidor. Verifica que esté corriendo en el puerto 3000.'
        );
      } finally {
        setLoading(false);
        nidInput.focus();
      }
    }
  </script>
</body>
</html>
